function toDateInput(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}
function fromDateInput(str) {
  const [y,m,d] = str.split("-").map(Number);
  return new Date(y,m-1,d);
}
function formatHeader(d) {
  return `${d.getMonth()+1}월 ${d.getDate()}일 (${WEEKDAYS[d.getDay()]})`;
}
function fmtMoney(n) { return Number(n).toLocaleString("ko-KR"); }

// ── 도넛 차트 ──────────────────────────────────
function DonutChart({ slices, total, selected, onSelect, size=280 }) {
  const cx = size/2, cy = size/2;
  const R = 90, r_inner = 39;   // 두께 15% 증가, 외곽 R 동일
  const GAP = 0.022;
  const LABEL_R = R + 15;       // 외부 라벨 간격 70%

  let startAngle = -Math.PI / 2;
  const computed = slices.map((s, i) => {
    const angle = (s.amount / total) * 2 * Math.PI - GAP;
    const midAngle = startAngle + GAP/2 + angle/2;
    const result = { ...s, startAngle: startAngle + GAP/2, angle, midAngle, color: COLORS[i % COLORS.length] };
    startAngle += (s.amount / total) * 2 * Math.PI;
    return result;
  });

  const polarToCart = (angle, radius) => ({
    x: cx + radius * Math.cos(angle),
    y: cy + radius * Math.sin(angle),
  });

  const describeArc = (sa, angle) => {
    const ea = sa + angle;
    const s = polarToCart(sa, R);
    const e = polarToCart(ea, R);
    const si = polarToCart(sa, r_inner);
    const ei = polarToCart(ea, r_inner);
    const large = angle > Math.PI ? 1 : 0;
    return `M ${si.x} ${si.y} L ${s.x} ${s.y} A ${R} ${R} 0 ${large} 1 ${e.x} ${e.y} L ${ei.x} ${ei.y} A ${r_inner} ${r_inner} 0 ${large} 0 ${si.x} ${si.y} Z`;
  };

  return (
    <svg width={size} height="254" viewBox={`0 10.8 ${size} 253.5`} style={{overflow:"visible"}}>
      {computed.map((s, i) => {
        const isSelected = selected === s.label;
        const offset = isSelected ? 8 : 0;
        const dx = offset * Math.cos(s.midAngle);
        const dy = offset * Math.sin(s.midAngle);
        const pct = s.amount / total;
        const mid = polarToCart(s.midAngle, (R + r_inner) / 2);
        // 외부 라벨: 도넛 바깥 중간각도 정중앙
        const extPt = polarToCart(s.midAngle, R + 16);

        return (
          <g key={i} transform={`translate(${dx},${dy})`}
            onClick={() => onSelect(isSelected ? null : s.label)}
            style={{cursor:"pointer"}}>
            <path d={describeArc(s.startAngle, s.angle)}
              fill={s.color}
              opacity={selected && !isSelected ? 0.28 : 1}
              stroke="#F5ECD8" strokeWidth={2}/>
            {/* 내부 라벨 (7% 이상) */}
            {pct > 0.07 && (
              <text x={mid.x} y={mid.y}
                fontSize={pct > 0.15 ? 12 : 10.5}
                fill="#fff" fontWeight={800}
                textAnchor="middle" dominantBaseline="middle"
                style={{pointerEvents:"none"}}>
                {s.label}
              </text>
            )}
            {/* 외부 라벨 (7% 미만) — 조각과 함께 이동, 중심각도 정중앙 */}
            {pct <= 0.07 && (
              <text x={extPt.x} y={extPt.y}
                fontSize={10.5} fill={s.color} fontWeight={700}
                textAnchor="middle" dominantBaseline="middle"
                opacity={selected && !isSelected ? 0.25 : 1}
                style={{pointerEvents:"none"}}>
                {s.label}
              </text>
            )}
          </g>
        );
      })}

      {/* 중앙 */}
      <text x={cx} y={cy} textAnchor="middle" dominantBaseline="middle"
        fontSize={13} fill="#5A3820" fontWeight={800}>
        {(selected
          ? fmtMoney(slices.find(s=>s.label===selected)?.amount||0)
          : fmtMoney(total)) + "원"}
      </text>
    </svg>
  );
}

// ── 월별 가로 막대 그래프 ──────────────────────
function MonthlyChart({ monthlyStats, allCats, maxTotal, MONTHS }) {
  const [selMonth, setSelMonth] = useState(null);

  return (
    <div style={{background:"rgba(251,245,232,0.95)",borderRadius:18,
      border:"1px solid #E0D0B8",overflow:"hidden"}}>

      {/* 범례 — sticky 헤더 */}
      <div style={{
        display:"flex",flexWrap:"wrap",justifyContent:"flex-end",gap:"4px 10px",
        padding:"12px 10px 10px",
        background:"rgba(251,245,232,0.98)",
        borderBottom:"1px solid #E8D8C0",
        position:"sticky", top:0, zIndex:1,
      }}>
        {allCats.map((cat,i)=>(
          <div key={cat} style={{display:"flex",alignItems:"center",gap:4}}>
            <div style={{width:8,height:8,borderRadius:2,
              background:COLORS[i%COLORS.length],flexShrink:0}}/>
            <span style={{fontSize:10,color:"#7A5A40"}}>{cat}</span>
          </div>
        ))}
      </div>

      {/* 스크롤 영역 */}
      <div style={{maxHeight:320,overflowY:"auto",padding:"14px 10px 12px"}}>
        {/* 가로 막대 */}
        <div style={{display:"flex",flexDirection:"column",gap:16}}>
        {monthlyStats.map((m, mi) => {
          const ratio = maxTotal > 0 ? m.total / maxTotal : 0;
          const prev = mi > 0 ? monthlyStats[mi-1].total : null;
          const diff = prev !== null ? m.total - prev : null;
          const isSelected = selMonth === m.month;

          const prevData = mi > 0 ? MONTHLY_DATA[MONTHS[mi-1]] || [] : [];
          const prevCatMap = {};
          prevData.forEach(l => { prevCatMap[l.category] = (prevCatMap[l.category]||0) + l.amount; });

          // 막대 영역 너비(px 기준) — 전체에서 왼쪽라벨(38px)을 뺀 영역의 55%
          const BAR_AREA = 0.55; // 전체 flex 공간 중 막대가 차지하는 비율

          return (
            <div key={m.month}>
              <div style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer"}}
                onClick={()=>setSelMonth(isSelected ? null : m.month)}>

                {/* 왼쪽: 월 + 총금액 */}
                <div style={{width:44,flexShrink:0,textAlign:"right",
                  display:"flex",flexDirection:"column",justifyContent:"center",height:34,
                  paddingRight:2}}>
                  <div style={{fontSize:12,fontWeight:800,lineHeight:1.2,
                    color:isSelected?"#C06030":"#5A3820"}}>
                    {m.month}월
                  </div>
                  <div style={{fontSize:11,color:"#B8A080",lineHeight:1.4,textAlign:"right"}}>
                    {fmtMoney(m.total)}
                  </div>
                </div>

                {/* 막대 + 전월대비 */}
                <div style={{flex:1,height:34,position:"relative",display:"flex",alignItems:"center",
                  paddingLeft:8}}>
                  {/* 막대: ratio만큼 차지 (전체 영역의 최대 58%) */}
                  <div style={{
                    height:"100%",
                    width:`${ratio * 58}%`,
                    display:"flex", borderRadius:5, overflow:"hidden", minWidth:2, flexShrink:0,
                  }}>
                    {m.top4.map(({cat,amt})=>{
                      const segW = (amt/m.total)*100;
                      const colIdx = allCats.indexOf(cat);
                      return (
                        <div key={cat} style={{
                          width:`${segW}%`,
                          background:COLORS[colIdx%COLORS.length],
                          flexShrink:0,
                        }}/>
                      );
                    })}
                  </div>

                  {/* 전월 대비 — 막대 끝에서 3px */}
                  {diff !== null && (
                    <div style={{
                      marginLeft:3, flexShrink:0,
                      display:"flex", flexDirection:"column", alignItems:"flex-end",
                    }}>
                      <div style={{fontSize:9,color:"#B8A080",lineHeight:1.3}}>전월 대비</div>
                      <div style={{
                        fontSize:10, fontWeight:400, lineHeight:1.3,
                        color: diff>0?"#C94040": diff<0?"#4A7FC1":"#B8A080",
                      }}>
                        {diff>0?"▲": diff<0?"▼":""}{fmtMoney(Math.abs(diff))}원
                      </div>
                    </div>
                  )}
                </div>
              </div>

              {/* 카테고리별 상세 */}
              {isSelected && (
                <div style={{
                  marginTop:8, marginLeft:52,
                  display:"inline-flex", flexDirection:"column", gap:4,
                  background:"rgba(234,216,184,0.45)",
                  borderRadius:8, padding:"8px 12px",
                }}>
                  {m.top4.map(({cat,amt})=>{
                    const prevAmt = prevCatMap[cat] || 0;
                    const catDiff = mi > 0 ? amt - prevAmt : null;
                    const colIdx = allCats.indexOf(cat);
                    return (
                      <div key={cat} style={{display:"flex",alignItems:"center",gap:6,whiteSpace:"nowrap"}}>
                        {/* 색상 + 항목명 */}
                        <div style={{width:6,height:6,borderRadius:1,flexShrink:0,
                          background:COLORS[colIdx%COLORS.length]}}/>
                        <span style={{fontSize:11,color:"#7A5A40",minWidth:28}}>{cat}</span>
                        {/* 전월→당월 */}
                        <div style={{display:"flex",alignItems:"center"}}>
                          <span style={{fontSize:10,color:"#B8A080",textAlign:"right",minWidth:48}}>
                            {mi>0 ? fmtMoney(prevAmt) : "—"}
                          </span>
                          <span style={{fontSize:10,color:"#C8B090",margin:"0 4px"}}>→</span>
                          <span style={{fontSize:10,color:"#7A5A40",textAlign:"right",minWidth:48}}>
                            {fmtMoney(amt)}
                          </span>
                        </div>
                        {/* 증감 */}
                        {catDiff !== null && (
                          <span style={{
                            fontSize:10, fontWeight:400, minWidth:58, textAlign:"right",
                            color:catDiff>0?"#C94040":catDiff<0?"#4A7FC1":"#B8A080",
                          }}>
                            ({catDiff>0?"▲":catDiff<0?"▼":""}{fmtMoney(Math.abs(catDiff))})
                          </span>
                        )}
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          );
        })}
        </div>
      </div>
    </div>
  );
}

function TabIcon({ id, active }) {
  const shadow = active
    ? "drop-shadow(0 2px 6px rgba(80,40,10,0.55)) drop-shadow(0 4px 12px rgba(100,50,10,0.35))"
    : "none";
  return (
    <img
      src={ICON_MAP[id]}
      alt={id}
      style={{
        width:30, height:30,
        objectFit:"contain",
        opacity: active ? 1 : 0.45,
        filter: shadow,
        transition:"opacity 0.15s, filter 0.15s",
      }}
    />
  );
}

function DatePickerModal({ value, onChange, onClose, songColor, phwangColor }) {
  const current = fromDateInput(value);
  const [viewYear,setViewYear]   = useState(current.getFullYear());
  const [viewMonth,setViewMonth] = useState(current.getMonth());
  const col = THEME.beige;
  const firstDay    = new Date(viewYear,viewMonth,1).getDay();
  const daysInMonth = new Date(viewYear,viewMonth+1,0).getDate();
  const today = new Date();
  const cells = [];
  for(let i=0;i<firstDay;i++) cells.push(null);
  for(let d=1;d<=daysInMonth;d++) cells.push(d);
  const isSelected = d => d && value===`${viewYear}-${String(viewMonth+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
  const isToday    = d => d===today.getDate()&&viewMonth===today.getMonth()&&viewYear===today.getFullYear();
  const handleDay  = d => { if(!d) return; onChange(`${viewYear}-${String(viewMonth+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`); };
  const prevMonth  = () => { if(viewMonth===0){setViewMonth(11);setViewYear(y=>y-1);}else setViewMonth(m=>m-1); };
  const nextMonth  = () => { if(viewMonth===11){setViewMonth(0);setViewYear(y=>y+1);}else setViewMonth(m=>m+1); };
  return (
    <div onClick={e=>{if(e.target===e.currentTarget)onClose();}} style={{
      position:"fixed",inset:0,background:"rgba(30,20,10,0.45)",
      display:"flex",alignItems:"center",justifyContent:"center",zIndex:200}}>
      <div style={{width:"calc(100% - 24px)",maxWidth:480,background:"#FBF5E8",
        borderRadius:20,padding:"16px 18px 22px",margin:"0",
        boxShadow:"0 8px 40px rgba(80,50,10,0.28)"}}>
        <div style={{textAlign:"center",marginBottom:12,background:col.light,borderRadius:10,padding:"7px 0"}}>
          <span style={{fontSize:16,fontWeight:800,color:col.deep,letterSpacing:"-0.5px"}}>
            {formatHeader(fromDateInput(value))}
          </span>
        </div>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
          <button onClick={prevMonth} style={navBtnStyle}>‹</button>
          <span style={{fontWeight:800,fontSize:13,color:"#2C1A0A"}}>{viewYear}년 {viewMonth+1}월</span>
          <button onClick={nextMonth} style={navBtnStyle}>›</button>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",marginBottom:2}}>
          {["일","월","화","수","목","금","토"].map((wd,i)=>(
            <div key={wd} style={{textAlign:"center",fontSize:10,fontWeight:700,paddingBottom:4,
              color:i===0?"#D45060":i===6?"#5090C0":"#C0A888"}}>{wd}</div>
          ))}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:"2px 0"}}>
          {cells.map((d,i)=>{
            const isSun=i%7===0,isSat=i%7===6,sel=isSelected(d),tod=isToday(d);
            return (
              <button key={i} onClick={()=>handleDay(d)} disabled={!d} style={{
                height:32,borderRadius:8,
                border:tod&&!sel?`2px solid ${col.main}`:"2px solid transparent",
                background:sel?col.main:"transparent",
                color:!d?"transparent":sel?"#fff":isSun?"#D45060":isSat?"#5090C0":"#2C1A0A",
                fontWeight:sel||tod?800:500,fontSize:12,cursor:d?"pointer":"default",transition:"all 0.12s",
              }}>{d||""}</button>
            );
          })}
        </div>
        <button onClick={onClose} style={{marginTop:12,width:"100%",padding:"11px 0",borderRadius:12,
          border:"none",background:col.grad,color:"#fff",fontWeight:800,fontSize:13,cursor:"pointer"}}>확인</button>
      </div>
    </div>
  );
}

    else if(key==="←") setAmount(p=>p.slice(0,-1));
    else if(key==="00"){ if(amount!=="") setAmount(p=>p+"00"); }
    else { if(amount==="0"||amount.length>=10) return; setAmount(p=>p+key); }
  };

  const formattedAmount = amount ? fmtMoney(amount) : "";
  const handleDateConfirm = () => { setSelectedDate(fromDateInput(pickerValue)); setShowDatePicker(false); };

  const typeTheme = type==="지출" ? THEME.expense : type==="수입" ? THEME.income : THEME.beige;
  const cardBg    = type==="지출" ? "rgba(235,246,255,0.94)" : type==="수입" ? "rgba(255,240,240,0.94)" : "rgba(255,248,235,0.94)";
  const borderColor = typeTheme.main;

  const chipActive = sel => sel
    ? { bg:typeTheme.light, border:typeTheme.main, color:typeTheme.deep }
    : { bg:"#fff", border:"#E0D0B8", color:"#B8A080" };

  const handleSave = () => {
    if(!amount || !type) return;
    onSave({ id:Date.now(), date:toDateInput(selectedDate), amount:Number(amount), type, category:category||"미분류", memo });
    setAmount(""); setCategory(""); setMemo("");
  };

  return (
    <div style={{position:"relative",zIndex:1,display:"flex",flexDirection:"column",alignItems:"center",padding:"0 0 80px 0"}}>
      {/* 화면 양쪽 하늘 여백 12px씩, 카드는 그 안에서 꽉 채움 */}
      <div style={{width:"calc(100% - 24px)",maxWidth:480,padding:"0",boxSizing:"border-box"}}>

        {/* 헤더 */}
        <div style={{padding:"22px 4px 12px",display:"flex",alignItems:"baseline",justifyContent:"space-between"}}>
          <span style={{fontSize:17,fontWeight:800,letterSpacing:"-0.3px",color:"#1a1a1a",lineHeight:1,
            textShadow:"0 1px 6px rgba(255,255,255,0.9)"}}>
            {formatHeader(selectedDate)}
          </span>
          <button onClick={()=>{setPickerValue(toDateInput(selectedDate));setShowDatePicker(true);}} style={{
            padding:"4px 10px",borderRadius:20,border:"1.5px solid rgba(255,255,255,0.85)",
            background:"rgba(255,255,255,0.75)",backdropFilter:"blur(6px)",
            color:"#6A5840",fontWeight:700,fontSize:11,letterSpacing:"-0.3px",cursor:"pointer",lineHeight:1}}>날짜수정</button>
        </div>

        {/* 카드 — 타입에 따라 배경색 전환 */}
        <div style={{
          background:cardBg,
          backdropFilter:"blur(14px)",borderRadius:20,
          border:`1px solid ${typeTheme.main}44`,
          boxShadow:`0 8px 32px ${typeTheme.main}22`,
          padding:"16px 14px 18px",
          display:"flex",flexDirection:"column",gap:12,
          transition:"background 0.3s, box-shadow 0.3s, border-color 0.3s",
        }}>

          {/* 금액 */}
          <Section label="금액">
            <div onClick={()=>setShowCalc(true)} style={{
              background:"#fff", borderRadius:11,
              border:`2px solid ${borderColor}`,
              padding:"9px 13px", cursor:"pointer",
              display:"flex", alignItems:"center", gap:5,
              transition:"border-color 0.3s",
            }}>
              <span style={{fontSize:formattedAmount?26:16,fontWeight:800,
                color:formattedAmount?"#2C1A0A":"#C8B898",letterSpacing:"-1px",flex:1,textAlign:"right"}}>
                {formattedAmount||"0"}
              </span>
              <span style={{fontSize:14,color:"#B8A080",fontWeight:600,flexShrink:0}}>원</span>
            </div>
          </Section>

          {/* 분류 */}
          <Section label="분류">
            <div style={{display:"flex",gap:7}}>
              {["지출","수입"].map(t=>{
                const tTheme = t==="지출" ? THEME.expense : THEME.income;
                const isActive = type===t;
                return (
                  <button key={t} onClick={()=>{setType(t);setCategory("");}} style={{
                    flex:1, padding:"8px 0", borderRadius:10,
                    border:`2px solid ${isActive ? tTheme.main : "#E0D0B8"}`,
                    background: isActive ? tTheme.light : "#fff",
                    color: isActive ? tTheme.deep : "#B8A080",
                    fontWeight:700, fontSize:13, cursor:"pointer", transition:"all 0.2s",
                  }}>
                    {t==="지출" ? "💸 지출" : "💰 수입"}
                  </button>
                );
              })}
            </div>
          </Section>

          {/* 소분류 */}
          <Section label="소분류">
            <div style={{display:"flex",flexWrap:"wrap",gap:6,minHeight:26}}>
              {!type ? (
                <span style={{fontSize:11,color:"#C8B090",lineHeight:"24px"}}>분류를 먼저 선택해주세요</span>
              ) : subCategories[type].length===0 ? (
                <span style={{fontSize:11,color:"#C8B090",lineHeight:"24px"}}>설정에서 소분류를 추가해주세요</span>
              ) : subCategories[type].map(cat=>{
                const c=chipActive(category===cat);
                return (
                  <button key={cat} onClick={()=>setCategory(cat)} style={{
                    padding:"3px 12px",borderRadius:20,border:`1.5px solid ${c.border}`,
                    background:c.bg,color:c.color,fontWeight:600,fontSize:11,cursor:"pointer",transition:"all 0.15s"}}>
                    {cat}
                  </button>
                );
              })}
            </div>
          </Section>

          {/* 메모 */}
          <Section label="메모">
            <textarea value={memo} onChange={e=>setMemo(e.target.value)} placeholder="세부 내용을 입력하세요" rows={2}
              style={{width:"100%",borderRadius:10,border:`1.5px solid ${borderColor}`,
                padding:"9px 12px",fontSize:12,color:"#2C1A0A",resize:"none",outline:"none",
                fontFamily:"inherit",background:"#fff",boxSizing:"border-box",transition:"border-color 0.3s"}}/>
          </Section>

          {/* 저장 */}
          <button onClick={handleSave} style={{
            padding:"12px 0",borderRadius:13,border:"none",
            background: typeTheme.grad,
            color:"#fff",fontWeight:800,fontSize:15,
            cursor:"pointer",letterSpacing:0.5,transition:"all 0.3s",
            boxShadow:`0 5px 18px ${typeTheme.main}44`,
            opacity: (!amount||!type) ? 0.55 : 1,
          }}>
            ✓ 저장하기
          </button>
        </div>
      </div>

      {/* 계산기 오버레이 — 화면 중간 위쪽 */}
      {showCalc && (
        <div onClick={e=>{if(e.target===e.currentTarget)setShowCalc(false);}} style={{
          position:"fixed",inset:0,background:"rgba(20,15,5,0.5)",
          display:"flex",
          alignItems:"center",        /* 중앙 배치 → 금액칸이 뒤에 살짝 보이는 높이 */
          justifyContent:"center",
          zIndex:100,
        }}>
          <div style={{
            width:"calc(100% - 24px)",maxWidth:480,
            background:"#FBF5E8",
            borderRadius:20,
            padding:"16px 14px 20px",
            margin:"0 8px",
            boxShadow:"0 8px 40px rgba(60,30,0,0.28)",
          }}>
            <div style={{background:"#EDE0C8",borderRadius:11,padding:"9px 13px",marginBottom:11,textAlign:"right"}}>
              <div style={{fontSize:10,color:"#B8A080",marginBottom:1}}>금액</div>
              <div style={{fontSize:26,fontWeight:800,color:"#2C1A0A",letterSpacing:"-1px"}}>
                {formattedAmount||"0"}
                <span style={{fontSize:13,fontWeight:600,color:"#9A8060",marginLeft:4}}>원</span>
              </div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:6}}>
              {["1","2","3","4","5","6","7","8","9"].map(k=>(
                <button key={k} onClick={()=>handleKey(k)} style={{height:46,borderRadius:10,
                  border:"1px solid #E0D0B8",background:"#fff",color:"#2C1A0A",
                  fontWeight:700,fontSize:19,cursor:"pointer"}}>{k}</button>
              ))}
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:6,marginTop:8}}>
              {["0","00","←"].map(k=>(
                <button key={k} onClick={()=>handleKey(k)} style={{height:46,borderRadius:10,
                  border:k==="←"?"none":"1px solid #E0D0B8",
                  background:k==="←"?typeTheme.light:"#fff",
                  color:k==="←"?typeTheme.deep:"#2C1A0A",
                  fontWeight:700,fontSize:k==="←"?17:19,cursor:"pointer"}}>{k}</button>
              ))}
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginTop:8}}>
              <button onClick={()=>handleKey("C")} style={{height:46,borderRadius:10,border:"none",
                background:"#EDE0C8",color:"#8A6840",fontWeight:700,fontSize:14,cursor:"pointer"}}>C</button>
              <button onClick={()=>setShowCalc(false)} style={{height:46,borderRadius:10,border:"none",
                background:typeTheme.grad,color:"#fff",fontWeight:800,fontSize:14,cursor:"pointer"}}>확인</button>
            </div>
          </div>
        </div>
      )}

      {showDatePicker && (
        <DatePickerModal value={pickerValue} onChange={setPickerValue} onClose={handleDateConfirm}
          songColor={songColor} phwangColor={phwangColor}/>
      )}
    </div>
  );
}

function AnalyzeScreen() {
  const MONTHS = Object.keys(MONTHLY_DATA);
  const [mainTab, setMainTab] = useState("카테고리");
  const [monthIdx, setMonthIdx] = useState(Math.max(0, MONTHS.length - 1));
  const [selected, setSelected] = useState(null);

  const currentMonth = MONTHS[monthIdx];
  const logs = MONTHLY_DATA[currentMonth] || [];

  // 카테고리별 집계
  const catMap = {};
  logs.forEach(l => { catMap[l.category] = (catMap[l.category]||0) + l.amount; });
  const slices = Object.entries(catMap)
    .map(([label, amount]) => ({ label, amount }))
    .sort((a,b) => b.amount - a.amount);
  const total = slices.reduce((s,c) => s+c.amount, 0);

  // 월별 집계 (막대그래프용)
  const monthlyStats = MONTHS.map(m => {
    const mLogs = MONTHLY_DATA[m] || [];
    const total = mLogs.reduce((s,l) => s+l.amount, 0);
    // top4 카테고리
    const cmap = {};
    mLogs.forEach(l => { cmap[l.category] = (cmap[l.category]||0) + l.amount; });
    const top4 = Object.entries(cmap)
      .sort((a,b) => b[1]-a[1])
      .slice(0,4)
      .map(([cat,amt]) => ({cat, amt}));
    return { month: m.slice(5), total, top4 };
  });

  const maxTotal = Math.max(...monthlyStats.map(m => m.total));
  const BAR_H = 140;
  const BAR_W = 48;

  // top4 카테고리 전체 목록 (색상 고정용)
  const allCats = [...new Set(MONTHS.flatMap(m =>
    (MONTHLY_DATA[m]||[]).map(l => l.category)
  ))];

  return (
    <div style={{position:"relative",zIndex:1,display:"flex",flexDirection:"column",
      alignItems:"center",padding:"16px 0 90px",fontFamily:"'Noto Sans KR',sans-serif"}}>
      <div style={{width:"calc(100% - 24px)",maxWidth:400,display:"flex",flexDirection:"column",gap:12}}>

        {/* 탭 */}
        <div style={{display:"flex",background:"rgba(251,245,232,0.8)",borderRadius:12,padding:3,gap:2}}>
          {["카테고리","월별"].map(t=>(
            <button key={t} onClick={()=>setMainTab(t)} style={{
              flex:1,padding:"7px 0",borderRadius:9,border:"none",
              background: mainTab===t ? "#EAD8B8" : "transparent",
              color: mainTab===t ? "#5A3820" : "#B8A080",
              fontWeight: mainTab===t ? 800 : 500,
              fontSize:12, cursor:"pointer",
            }}>{t}</button>
          ))}
        </div>

        {/* ── 카테고리 탭 ── */}
        {mainTab === "카테고리" && <>

          {/* 도넛 카드 (연월 네비 포함) */}
          <div style={{background:"rgba(251,245,232,0.95)",borderRadius:18,
            padding:"10px 10px 0",border:"1px solid #E0D0B8",
            display:"flex", flexDirection:"column", alignItems:"center"}}>
            {/* 연월 네비게이션 */}
            <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:16,
              width:"100%",paddingBottom:4}}>
              <button onClick={()=>setMonthIdx(i=>Math.max(0,i-1))}
                disabled={monthIdx===0}
                style={{background:"none",border:"none",cursor:"pointer",padding:4,
                  opacity:monthIdx===0?0.3:1}}>
                <svg width={10} height={14} viewBox="0 0 10 14">
                  <path d="M8 1L2 7L8 13" stroke="#8A6840" strokeWidth={2}
                    strokeLinecap="round" strokeLinejoin="round" fill="none"/>
                </svg>
              </button>
              <span style={{fontSize:15,fontWeight:800,color:"#5A3820",letterSpacing:"-0.3px"}}>
                {currentMonth ? currentMonth.replace("/"," / ") : "-"}
              </span>
              <button onClick={()=>setMonthIdx(i=>Math.min(MONTHS.length-1,i+1))}
                disabled={monthIdx===MONTHS.length-1}
                style={{background:"none",border:"none",cursor:"pointer",padding:4,
                  opacity:monthIdx===MONTHS.length-1?0.3:1}}>
                <svg width={10} height={14} viewBox="0 0 10 14">
                  <path d="M2 1L8 7L2 13" stroke="#8A6840" strokeWidth={2}
                    strokeLinecap="round" strokeLinejoin="round" fill="none"/>
                </svg>
              </button>
            </div>
            <DonutChart slices={slices} total={total}
              selected={selected} onSelect={setSelected} size={280}/>
          </div>

          {/* 로그 리스트 */}
          {(() => {
            const displayLogs = (selected
              ? logs.filter(l => l.category === selected)
              : [...logs]
            ).sort((a,b) => b.amount - a.amount || a.date.localeCompare(b.date));
            const color = selected
              ? COLORS[slices.findIndex(s=>s.label===selected) % COLORS.length]
              : "#C8A878";
            return (
              <div style={{background:"rgba(251,245,232,0.95)",borderRadius:16,
                border:"1px solid #E0D0B8", overflow:"hidden"}}>
                <div style={{display:"flex",alignItems:"center",padding:"7px 14px",
                  background:"#EAD8B8",borderBottom:"1px solid #E0D0B8",
                  position:"sticky",top:0,zIndex:1}}>
                  <span style={{fontSize:13,fontWeight:800,color:"#5A3820",flex:1}}>
                    {selected ? <span style={{color}}>{selected}</span> : "전체"}
                    <span style={{fontSize:11,fontWeight:500,color:"#B8A080",marginLeft:6}}>
                      ({displayLogs.length}건)
                    </span>
                  </span>
                  <span style={{fontSize:13,fontWeight:700,color:"#5A3820"}}>
                    {fmtMoney(displayLogs.reduce((s,l)=>s+l.amount,0))}원
                  </span>
                </div>
                <div style={{display:"flex",alignItems:"center",padding:"4px 14px",
                  background:"rgba(234,216,184,0.5)",borderBottom:"1px solid #EDE0C8",
                  position:"sticky",top:32,zIndex:1}}>
                  <span style={{fontSize:9,color:"#B8A080",width:46,flexShrink:0}}>날짜</span>
                  <span style={{fontSize:9,color:"#B8A080",flex:1,paddingLeft:12}}>내용</span>
                  {!selected && <span style={{fontSize:9,color:"#B8A080",width:36,flexShrink:0,textAlign:"center",marginRight:8}}>분류</span>}
                  <span style={{fontSize:9,color:"#B8A080",width:64,flexShrink:0,textAlign:"right"}}>금액</span>
                </div>
                <div style={{maxHeight:220,overflowY:"auto"}}>
                  {displayLogs.map((l,i)=>(
                    <div key={l.id} style={{display:"flex",alignItems:"center",
                      padding:"6px 14px",
                      borderBottom:i<displayLogs.length-1?"1px solid #F0E4D0":"none"}}>
                      <span style={{fontSize:10,color:"#B8A080",width:46,flexShrink:0}}>
                        {l.date.slice(5).replace("-","/")}
                      </span>
                      <span style={{flex:1,fontSize:11,color:"#7A5A40",paddingLeft:12,
                        overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                        {l.memo}
                      </span>
                      {!selected && (
                        <span style={{fontSize:9,color:"#fff",width:36,flexShrink:0,
                          background:COLORS[slices.findIndex(s=>s.label===l.category)%COLORS.length],
                          borderRadius:4,padding:"1px 4px",textAlign:"center",marginRight:8,
                          overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                          {l.category}
                        </span>
                      )}
                      <span style={{fontSize:11,fontWeight:700,color:"#C94040",
                        width:64,flexShrink:0,textAlign:"right"}}>
                        {fmtMoney(l.amount)}
                      </span>
                    </div>
                  ))}
                </div>
              </div>
            );
          })()}
        </>}

        {/* ── 월별 탭 ── */}
        {mainTab === "월별" && (
          <MonthlyChart
            monthlyStats={monthlyStats}
            allCats={allCats}
            maxTotal={maxTotal}
            MONTHS={MONTHS}
          />
        )}

      </div>
    </div>
  );
}
function SavingScreen({ subCategories }) {
  const assetNames = subCategories["자산"] || [];

  // 자산별 상태: { balance, history, showHistory, newDate, newAmount, newMemo }
  const initAsset = (name) => ({
    name,
    balance: 0,
    history: [],
    showHistory: false,
    newDate: new Date().toISOString().slice(0,10),
    newAmount: "",
    newMemo: "",
    selectedHistory: null,
    editingHistory: null,
    editHistoryDate: "",
    editHistoryAmount: "",
    editHistoryMemo: "",
  });

  const [assets, setAssets] = useState(() => {
        return assetNames.map(name => initAsset(name));
  });

  // 설정에서 자산 목록 바뀌면 동기화
  useEffect(() => {
    setAssets(prev => assetNames.map(name => {
      const ex = prev.find(a => a.name === name);
      return ex || initAsset(name);
    }));
  }, [assetNames.join(",")]);

  const updateAsset = (idx, patch) =>
    setAssets(p => p.map((a,i) => i===idx ? {...a,...patch} : a));

  const addHistory = (idx) => {
    const a = assets[idx];
    const amt = parseInt(a.newAmount.replace(/,/g,""), 10);
    if (!amt || !a.newDate) return;
    const entry = { id: Date.now(), date: a.newDate, amount: amt, memo: a.newMemo };
    updateAsset(idx, {
      balance: a.balance + amt,
      history: [entry, ...a.history],
      newAmount: "",
      newMemo: "",
    });
  };

  const ROW_H = 34;
  const MAX_VISIBLE = 5.5;

  // 날짜 표시용: yyyy-MM-dd → yyyy/MM/dd
  const fmtDateDisp = (d) => d.replace(/-/g,"/");
  // 텍스트 입력 날짜 → yyyy-MM-dd 변환
  const parseDateInput = (v) => v.replace(/\//g,"-");

  return (
    <div style={{position:"relative",zIndex:1,display:"flex",flexDirection:"column",
      alignItems:"center",padding:"16px 0 90px"}}>
      <div style={{width:"calc(100% - 24px)",maxWidth:480,display:"flex",flexDirection:"column",gap:10}}>

        {/* 자산 카드 */}
        {assets.map((asset, idx) => (
          <div key={asset.name} style={{
            background:"rgba(251,245,232,0.95)",backdropFilter:"blur(14px)",
            borderRadius:16,padding:"11px 13px 10px",border:"1px solid #E0D0B8",
          }}>
            {/* 타이틀 + 금액 한 줄 */}
            <div style={{display:"flex",alignItems:"baseline",justifyContent:"space-between",marginBottom:8}}>
              <span style={{fontSize:13,fontWeight:800,color:"#5A3820"}}>{asset.name}</span>
              <div style={{display:"flex",alignItems:"baseline",gap:2}}>
                <span style={{fontSize:18,fontWeight:800,color:"#5A3820",letterSpacing:"-0.5px"}}>
                  {fmtMoney(asset.balance)}
                </span>
                <span style={{fontSize:11,color:"#A09070",marginLeft:2}}>원</span>
              </div>
            </div>

            {/* 신규 입력 */}
            <div style={{display:"flex",gap:4,marginBottom:8}}>
              {/* 날짜: 텍스트 입력, yyyy/MM/dd 형식 */}
              <input
                type="text" inputMode="numeric"
                value={fmtDateDisp(asset.newDate)}
                onChange={e=>{
                  const raw = e.target.value.replace(/[^0-9\/]/g,"");
                  // 자동 슬래시 삽입
                  let v = raw.replace(/\//g,"");
                  if (v.length>4) v = v.slice(0,4)+"/"+v.slice(4);
                  if (v.length>7) v = v.slice(0,7)+"/"+v.slice(7);
                  v = v.slice(0,10);
                  updateAsset(idx,{newDate:parseDateInput(v)});
                }}
                placeholder="yyyy/mm/dd"
                style={{width:84,borderRadius:7,border:"1.5px solid #E0D0B8",
                  padding:"4px 5px",fontSize:11,outline:"none",background:"#fff",
                  color:"#6A5040",boxSizing:"border-box",textAlign:"center"}}/>
              {/* 금액 */}
              <input type="text" inputMode="numeric"
                value={asset.newAmount}
                onChange={e=>updateAsset(idx,{newAmount:e.target.value.replace(/[^0-9\-]/g,"")})}
                placeholder="금액"
                style={{width:90,borderRadius:7,border:"1.5px solid #E0D0B8",
                  padding:"4px 5px",fontSize:11,outline:"none",background:"#fff",
                  textAlign: asset.newAmount ? "right" : "center",
                  color:"#6A5040",boxSizing:"border-box"}}/>
              {/* 내용 */}
              <input type="text" value={asset.newMemo}
                onChange={e=>updateAsset(idx,{newMemo:e.target.value})}
                onKeyDown={e=>e.key==="Enter"&&addHistory(idx)}
                placeholder="내용"
                style={{width:72,borderRadius:7,border:"1.5px solid #E0D0B8",
                  padding:"4px 5px",fontSize:11,outline:"none",background:"#fff",
                  textAlign: asset.newMemo ? "left" : "center",
                  color:"#6A5040",boxSizing:"border-box"}}/>
              <button onClick={()=>addHistory(idx)}
                style={{borderRadius:7,border:"none",background:THEME.beige.main,
                  color:"#fff",padding:"4px 9px",fontWeight:700,fontSize:12,
                  cursor:"pointer",flexShrink:0}}>+</button>
            </div>

            {/* 이력 헤더 */}
            {asset.history.length > 0 && (
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:3}}>
                <span style={{fontSize:10,fontWeight:700,color:"#B8A080",letterSpacing:0.5}}>
                  이력 ({asset.history.length})
                </span>
                <button
                  onClick={()=>updateAsset(idx,{showHistory:!asset.showHistory})}
                  style={{fontSize:10,color:"#A09070",background:"none",border:"none",
                    cursor:"pointer",fontWeight:600,padding:"2px 4px"}}>
                  {asset.showHistory ? "숨기기 ▲" : "보이기 ▼"}
                </button>
              </div>
            )}

            {/* 이력 목록 */}
            {asset.showHistory && asset.history.length > 0 && (
              <div style={{
                maxHeight: ROW_H * MAX_VISIBLE,
                overflowY:"auto",
                borderRadius:8,
                border:"1px solid #EDE0C8",
                background:"rgba(255,255,255,0.6)",
              }}>
                {asset.history.map((h, hi) => {
                  const isSelected = asset.selectedHistory === h.id;
                  const isEditingH = asset.editingHistory === h.id;
                  return (
                    <div key={h.id}>
                      {/* 일반 행 */}
                      {!isEditingH && (
                        <div
                          onClick={()=>updateAsset(idx,{
                            selectedHistory: isSelected ? null : h.id,
                            editingHistory: null,
                          })}
                          style={{
                            display:"flex", alignItems:"center", gap:6,
                            padding:"0 9px",
                            height: ROW_H,
                            borderBottom: !isSelected && hi < asset.history.length-1 ? "1px solid #F0E4D0" : "none",
                            boxSizing:"border-box",
                            background: isSelected ? "#FFF5C0" : "transparent",
                            cursor:"pointer",
                          }}>
                          <span style={{fontSize:10,color:"#B8A080",flexShrink:0,width:58}}>
                            {fmtDateDisp(h.date).slice(5)}
                          </span>
                          <span style={{flex:1,fontSize:11,color:"#7A5A40",
                            overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                            {h.memo || "—"}
                          </span>
                          <span style={{
                            fontSize:12,fontWeight:700,flexShrink:0,
                            color: h.amount >= 0 ? THEME.expense.deep : THEME.income.deep,
                          }}>
                            {h.amount >= 0 ? "+" : ""}{fmtMoney(h.amount)}
                          </span>
                        </div>
                      )}

                      {/* 선택 시 수정/삭제 버튼 행 */}
                      {isSelected && !isEditingH && (
                        <div style={{
                          display:"flex", gap:6, padding:"4px 9px 5px",
                          borderBottom: hi < asset.history.length-1 ? "1px solid #F0E4D0" : "none",
                          background:"#FFF5C0",
                        }}>
                          <button onClick={e=>{
                            e.stopPropagation();
                            updateAsset(idx,{
                              editingHistory: h.id,
                              editHistoryDate: fmtDateDisp(h.date),
                              editHistoryAmount: String(h.amount),
                              editHistoryMemo: h.memo,
                              selectedHistory: null,
                            });
                          }} style={{flex:1,borderRadius:7,border:"none",background:"#EDE0C8",
                            color:"#6A5040",fontWeight:700,fontSize:11,padding:"5px 0",cursor:"pointer"}}>
                            수정
                          </button>
                          <button onClick={e=>{
                            e.stopPropagation();
                            updateAsset(idx,{
                              balance: asset.balance - h.amount,
                              history: asset.history.filter(x=>x.id!==h.id),
                              selectedHistory: null,
                            });
                          }} style={{flex:1,borderRadius:7,border:"none",background:"#FCE4E4",
                            color:THEME.income.deep,fontWeight:700,fontSize:11,padding:"5px 0",cursor:"pointer"}}>
                            삭제
                          </button>
                          <button onClick={e=>{
                            e.stopPropagation();
                            updateAsset(idx,{selectedHistory:null});
                          }} style={{flex:1,borderRadius:7,border:"none",background:"#F5ECD8",
                            color:"#A09070",fontWeight:700,fontSize:11,padding:"5px 0",cursor:"pointer"}}>
                            취소
                          </button>
                        </div>
                      )}

                      {/* 수정 행 */}
                      {isEditingH && (
                        <div style={{
                          display:"flex", gap:4, padding:"5px 9px",
                          borderBottom: hi < asset.history.length-1 ? "1px solid #F0E4D0" : "none",
                          background:"#FFF5C0",
                        }}>
                          <input type="text" value={asset.editHistoryDate}
                            onChange={e=>{
                              const raw=e.target.value.replace(/[^0-9\/]/g,"");
                              let v=raw.replace(/\//g,"");
                              if(v.length>4) v=v.slice(0,4)+"/"+v.slice(4);
                              if(v.length>7) v=v.slice(0,7)+"/"+v.slice(7);
                              updateAsset(idx,{editHistoryDate:v.slice(0,10)});
                            }}
                            style={{width:84,flexShrink:0,borderRadius:6,border:"1.5px solid #E0D0B8",
                              padding:"4px 5px",fontSize:11,outline:"none",background:"#fff",
                              color:"#6A5040",textAlign:"center",boxSizing:"border-box"}}/>
                          <input type="text" inputMode="numeric" value={asset.editHistoryAmount}
                            onChange={e=>updateAsset(idx,{editHistoryAmount:e.target.value.replace(/[^0-9\-]/g,"")})}
                            style={{width:90,flexShrink:0,borderRadius:6,border:"1.5px solid #E0D0B8",
                              padding:"4px 5px",fontSize:11,outline:"none",background:"#fff",
                              textAlign:"right",color:"#6A5040",boxSizing:"border-box"}}/>
                          <input type="text" value={asset.editHistoryMemo}
                            onChange={e=>updateAsset(idx,{editHistoryMemo:e.target.value})}
                            style={{flex:1,borderRadius:6,border:"1.5px solid #E0D0B8",
                              padding:"4px 5px",fontSize:11,outline:"none",background:"#fff",
                              color:"#6A5040",boxSizing:"border-box"}}/>
                          <button onClick={()=>{
                            const newAmt = parseInt(asset.editHistoryAmount,10);
                            if (!newAmt) return;
                            const diff = newAmt - h.amount;
                            updateAsset(idx,{
                              balance: asset.balance + diff,
                              history: asset.history.map(x=>x.id===h.id?{
                                ...x,
                                date: parseDateInput(asset.editHistoryDate),
                                amount: newAmt,
                                memo: asset.editHistoryMemo,
                              }:x),
                              editingHistory: null,
                            });
                          }} style={{borderRadius:6,border:"none",background:THEME.beige.main,
                            color:"#fff",padding:"4px 8px",fontWeight:700,fontSize:11,
                            cursor:"pointer",flexShrink:0}}>저장</button>
                          <button onClick={()=>updateAsset(idx,{editingHistory:null})}
                            style={{borderRadius:6,border:"none",background:"#EDE0C8",
                              color:"#8A7060",padding:"4px 6px",fontWeight:600,fontSize:11,
                              cursor:"pointer",flexShrink:0}}>취소</button>
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        ))}

        {assetNames.length === 0 && (
          <div style={{textAlign:"center",color:"#C8B090",fontSize:13,padding:"40px 0"}}>
            설정 &gt; 자산 탭에서 자산을 추가해주세요
          </div>
        )}
      </div>
    </div>
  );
}

// ════════════════════════════════════════════════════
// 로그 화면
// ════════════════════════════════════════════════════
function LogScreen({ logs, onDelete, onEdit, subCategories }) {
  const [editingId,  setEditingId]  = useState(null);
  const [editForm,   setEditForm]   = useState({});
  const [confirmId,  setConfirmId]  = useState(null);
  const [floatType,  setFloatType]  = useState(null); // "date"|"amount"|"category"|"memo"
  const [memoInput,  setMemoInput]  = useState("");

  // 계산기 내부 상태
  const [calcAmt, setCalcAmt] = useState("");

  const sorted = [...logs].sort((a,b) => b.date.localeCompare(a.date) || b.id - a.id);

  // 날짜 | 금액 | 소분류 | 메모+버튼
  const COL = "44px 74px 58px 1fr";

  const cellBase = {
    fontSize:11, lineHeight:1.35,
    overflow:"hidden", whiteSpace:"nowrap", textOverflow:"ellipsis",
  };

  const openEdit = (log) => {
    setEditingId(log.id);
    setEditForm({
      date: log.date, type: log.type,
      amount: String(log.amount), category: log.category, memo: log.memo||"",
    });
    setCalcAmt(String(log.amount));
  };

  const saveEdit = () => {
    onEdit(editingId, { ...editForm, amount: Number(editForm.amount) });
    setEditingId(null); setFloatType(null);
  };

  const openFloat = (type) => {
    if(type==="amount") setCalcAmt(editForm.amount||"");
    if(type==="memo")   setMemoInput(editForm.memo||"");
    setFloatType(type);
  };

  const handleCalcKey = key => {
    if(key==="C") setCalcAmt("");
    else if(key==="←") setCalcAmt(p=>p.slice(0,-1));
    else if(key==="00"){ if(calcAmt!=="") setCalcAmt(p=>p+"00"); }
    else { if(calcAmt==="0"||calcAmt.length>=10) return; setCalcAmt(p=>p+key); }
  };

  // 달력용 로컬 state는 FloatDatePicker 컴포넌트 안에서 관리
  const WEEKDAYS_S = ["일","월","화","수","목","금","토"];

  /* ── 플로팅: 날짜 선택 ── */
  const FloatDate = () => {
    const cur = fromDateInput(editForm.date);
    const [vy, setVy] = useState(cur.getFullYear());
    const [vm, setVm] = useState(cur.getMonth());
    const fd = new Date(vy,vm,1).getDay();
    const dim = new Date(vy,vm+1,0).getDate();
    const cells = [];
    for(let i=0;i<fd;i++) cells.push(null);
    for(let d=1;d<=dim;d++) cells.push(d);
    const isSel = d => d && editForm.date===`${vy}-${String(vm+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    const pickDay = d => {
      if(!d) return;
      setEditForm(f=>({...f, date:`${vy}-${String(vm+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`}));
      setFloatType(null);
    };
    const prevM = ()=>{ if(vm===0){setVm(11);setVy(y=>y-1);}else setVm(m=>m-1); };
    const nextM = ()=>{ if(vm===11){setVm(0);setVy(y=>y+1);}else setVm(m=>m+1); };
    return (
      <div onClick={e=>{if(e.target===e.currentTarget)setFloatType(null);}} style={{
        position:"fixed",inset:0,background:"rgba(20,15,5,0.5)",
        display:"flex",alignItems:"center",justifyContent:"center",zIndex:300}}>
        <div style={{width:"calc(100% - 24px)",maxWidth:480,background:"#FBF5E8",
          borderRadius:20,padding:"16px 18px 20px",boxShadow:"0 8px 40px rgba(60,30,0,0.28)"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
            <button onClick={prevM} style={navBtnStyle}>‹</button>
            <span style={{fontWeight:800,fontSize:14,color:"#2C1A0A"}}>{vy}년 {vm+1}월</span>
            <button onClick={nextM} style={navBtnStyle}>›</button>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",marginBottom:4}}>
            {WEEKDAYS_S.map((w,i)=>(
              <div key={w} style={{textAlign:"center",fontSize:10,fontWeight:700,paddingBottom:4,
                color:i===0?"#D45060":i===6?"#5090C0":"#C0A888"}}>{w}</div>
            ))}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:"2px 0"}}>
            {cells.map((d,i)=>{
              const sun=i%7===0,sat=i%7===6,sel=isSel(d);
              return (
                <button key={i} onClick={()=>pickDay(d)} disabled={!d} style={{
                  height:34,borderRadius:8,border:"2px solid transparent",
                  background:sel?"#C8A878":"transparent",
                  color:!d?"transparent":sel?"#fff":sun?"#D45060":sat?"#5090C0":"#2C1A0A",
                  fontWeight:sel?800:500,fontSize:13,cursor:d?"pointer":"default",transition:"all 0.1s"}}>
                  {d||""}
                </button>
              );
            })}
          </div>
          <button onClick={()=>setFloatType(null)} style={{marginTop:12,width:"100%",padding:"10px 0",
            borderRadius:12,border:"none",background:"#EDE0C8",color:"#8A7060",
            fontWeight:700,fontSize:13,cursor:"pointer"}}>닫기</button>
        </div>
      </div>
    );
  };

  /* ── 플로팅: 금액 계산기 ── */
  const FloatCalc = () => (
    <div onClick={e=>{if(e.target===e.currentTarget)setFloatType(null);}} style={{
      position:"fixed",inset:0,background:"rgba(20,15,5,0.5)",
      display:"flex",alignItems:"center",justifyContent:"center",zIndex:300}}>
      <div style={{width:"calc(100% - 24px)",maxWidth:480,background:"#FBF5E8",
        borderRadius:20,padding:"16px 14px 20px",boxShadow:"0 8px 40px rgba(60,30,0,0.28)"}}>
        <div style={{background:"#EDE0C8",borderRadius:11,padding:"9px 13px",marginBottom:11,textAlign:"right"}}>
          <div style={{fontSize:10,color:"#B8A080",marginBottom:1}}>금액</div>
          <div style={{fontSize:26,fontWeight:800,color:"#2C1A0A",letterSpacing:"-1px"}}>
            {calcAmt ? fmtMoney(calcAmt) : "0"}
            <span style={{fontSize:13,fontWeight:600,color:"#9A8060",marginLeft:4}}>원</span>
          </div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:6}}>
          {["1","2","3","4","5","6","7","8","9"].map(k=>(
            <button key={k} onClick={()=>handleCalcKey(k)} style={{height:44,borderRadius:10,
              border:"1px solid #E0D0B8",background:"#fff",color:"#2C1A0A",
              fontWeight:700,fontSize:18,cursor:"pointer"}}>{k}</button>
          ))}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:6,marginTop:6}}>
          {["0","00","←"].map(k=>(
            <button key={k} onClick={()=>handleCalcKey(k)} style={{height:44,borderRadius:10,
              border:k==="←"?"none":"1px solid #E0D0B8",
              background:k==="←"?"#F5E8D8":"#fff",
              color:k==="←"?"#8A6040":"#2C1A0A",
              fontWeight:700,fontSize:k==="←"?16:18,cursor:"pointer"}}>{k}</button>
          ))}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginTop:6}}>
          <button onClick={()=>handleCalcKey("C")} style={{height:44,borderRadius:10,border:"none",
            background:"#EDE0C8",color:"#8A6840",fontWeight:700,fontSize:13,cursor:"pointer"}}>C</button>
          <button onClick={()=>{ setEditForm(f=>({...f,amount:calcAmt||"0"})); setFloatType(null); }} style={{
            height:44,borderRadius:10,border:"none",background:"#C8A878",color:"#fff",
            fontWeight:800,fontSize:13,cursor:"pointer"}}>확인</button>
        </div>
      </div>
    </div>
  );

  /* ── 플로팅: 소분류 선택 ── */
  const FloatCategory = () => {
    const types = ["지출","수입"];
    return (
      <div onClick={e=>{if(e.target===e.currentTarget)setFloatType(null);}} style={{
        position:"fixed",inset:0,background:"rgba(20,15,5,0.5)",
        display:"flex",alignItems:"center",justifyContent:"center",zIndex:300}}>
        <div style={{width:"calc(100% - 24px)",maxWidth:480,background:"#FBF5E8",
          borderRadius:20,padding:"18px 16px 22px",boxShadow:"0 8px 40px rgba(60,30,0,0.28)"}}>
          {/* 지출/수입 탭 */}
          <div style={{display:"flex",gap:8,marginBottom:16}}>
            {types.map(t=>{
              const tt = t==="지출" ? THEME.expense : THEME.income;
              const active = editForm.type===t;
              return (
                <button key={t} onClick={()=>setEditForm(f=>({...f,type:t,category:""}))} style={{
                  flex:1,padding:"8px 0",borderRadius:10,
                  border:`2px solid ${active?tt.main:"#E0D0B8"}`,
                  background:active?tt.light:"#fff",
                  color:active?tt.deep:"#B8A080",
                  fontWeight:700,fontSize:13,cursor:"pointer",transition:"all 0.15s"}}>
                  {t==="지출"?"💸 지출":"💰 수입"}
                </button>
              );
            })}
          </div>
          {/* 소분류 칩 */}
          <div style={{fontSize:10,fontWeight:700,color:"#B8A080",letterSpacing:0.8,marginBottom:10}}>소분류 선택</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:8,minHeight:32}}>
            {(subCategories?.[editForm.type]||[]).length===0 ? (
              <span style={{fontSize:12,color:"#C8B090"}}>설정에서 소분류를 추가해주세요</span>
            ) : (subCategories[editForm.type]||[]).map(cat=>{
              const tt = editForm.type==="지출" ? THEME.expense : THEME.income;
              const active = editForm.category===cat;
              return (
                <button key={cat} onClick={()=>{ setEditForm(f=>({...f,category:cat})); setFloatType(null); }} style={{
                  padding:"6px 14px",borderRadius:20,
                  border:`1.5px solid ${active?tt.main:"#E0D0B8"}`,
                  background:active?tt.light:"#fff",
                  color:active?tt.deep:"#B8A080",
                  fontWeight:600,fontSize:12,cursor:"pointer"}}>
                  {cat}
                </button>
              );
            })}
          </div>
          <button onClick={()=>setFloatType(null)} style={{marginTop:16,width:"100%",padding:"10px 0",
            borderRadius:12,border:"none",background:"#EDE0C8",color:"#8A7060",
            fontWeight:700,fontSize:13,cursor:"pointer"}}>닫기</button>
        </div>
      </div>
    );
  };

  return (
    <div style={{position:"relative",zIndex:1,display:"flex",flexDirection:"column",alignItems:"center",padding:"16px 0 90px"}}>
      <div style={{width:"calc(100% - 24px)",maxWidth:480,boxSizing:"border-box"}}>

        {/* 헤더 — sticky 고정 */}
        <div style={{
          position:"sticky", top:0, zIndex:10,
          display:"grid",gridTemplateColumns:COL,gap:"0 5px",
          padding:"7px 10px",
          background:"#C8A878",borderRadius:"12px 12px 0 0",
          border:"1px solid #B89060",borderBottom:"none",
        }}>
          {["날짜","금액","소분류"].map(h=>(
            <div key={h} style={{fontSize:10,fontWeight:800,color:"#fff",letterSpacing:0.4,
              textAlign:"center"}}>{h}</div>
          ))}
          {/* 메모 왼쪽, 수정 버튼 2개(18+3+18=39px) 가운데 */}
          <div style={{display:"flex",alignItems:"center"}}>
            <span style={{flex:1,fontSize:10,fontWeight:800,color:"#fff",letterSpacing:0.4,paddingLeft:6}}>메모</span>
            <span style={{
              width:39, textAlign:"center",
              fontSize:10,fontWeight:800,color:"#fff",letterSpacing:0.4,flexShrink:0,
            }}>수정</span>
          </div>
        </div>

        {/* 빈 상태 */}
        {sorted.length===0 && (
          <div style={{background:"rgba(251,245,232,0.94)",border:"1px solid #E0D0B8",
            borderTop:"none",borderRadius:"0 0 12px 12px",
            padding:"40px 0",textAlign:"center",color:"#C8B090",fontSize:13}}>
            아직 저장된 내역이 없어요 🐷
          </div>
        )}

        {sorted.map((log, idx) => {
          const isLast    = idx===sorted.length-1;
          const isEditing = editingId===log.id;
          const isConfirm = confirmId===log.id;
          const rowBg     = log.type==="지출" ? "#E8F4FC" : "#FCEAEA";
          const amtColor  = log.type==="지출" ? THEME.expense.deep : THEME.income.deep;
          // 편집 중일 때 표시할 값
          const dispDate   = isEditing ? editForm.date.slice(5).replace("-","/") : log.date.slice(5).replace("-","/");
          const dispAmt    = isEditing ? (editForm.amount ? fmtMoney(editForm.amount) : "0") : fmtMoney(log.amount);
          const dispCat    = isEditing ? editForm.category : log.category;
          const dispMemo   = isEditing ? editForm.memo : (log.memo||"—");
          const dispType   = isEditing ? editForm.type : log.type;
          const dispAmtClr = isEditing ? (editForm.type==="지출"?THEME.expense.deep:THEME.income.deep) : amtColor;
          const dispRowBg  = isEditing ? (editForm.type==="지출"?"#E8F4FC":"#FCEAEA") : rowBg;

          return (
            <div key={log.id}>
              {/* ── 메인/편집 행 (같은 레이아웃) ── */}
              <div style={{
                display:"grid",gridTemplateColumns:COL,gap:"0 5px",
                padding:"8px 10px",
                background: dispRowBg,
                border:"1px solid #E0D0B8",borderTop:"none",
                borderRadius: isLast&&!isConfirm ? "0 0 12px 12px" : 0,
                alignItems:"center",
                transition:"background 0.2s",
              }}>
                {/* 날짜 */}
                <div
                  onClick={isEditing ? ()=>openFloat("date") : undefined}
                  style={{
                    ...cellBase, color:"#7A6850", fontSize:11, textAlign:"center",
                    cursor: isEditing ? "pointer" : "default",
                    background: isEditing ? "rgba(200,168,120,0.15)" : "transparent",
                    borderRadius: isEditing ? 6 : 0, padding: isEditing ? "2px 0" : 0,
                    textDecoration: isEditing ? "underline dotted #C8A878" : "none",
                  }}>
                  {dispDate}
                </div>

                {/* 금액 */}
                <div
                  onClick={isEditing ? ()=>openFloat("amount") : undefined}
                  style={{
                    ...cellBase, fontWeight:800, fontSize:12, color:dispAmtClr,
                    textAlign:"right", paddingRight:6, letterSpacing:"-0.5px",
                    cursor: isEditing ? "pointer" : "default",
                    background: isEditing ? "rgba(200,168,120,0.15)" : "transparent",
                    borderRadius: isEditing ? 6 : 0,
                    textDecoration: isEditing ? "underline dotted #C8A878" : "none",
                  }}>
                  {dispType==="지출"?"-":"+"}{dispAmt}
                </div>

                {/* 소분류 */}
                <div
                  onClick={isEditing ? ()=>openFloat("category") : undefined}
                  style={{
                    ...cellBase, fontSize:10, color:"#6A5840", textAlign:"center",
                    background: isEditing ? "rgba(200,168,120,0.25)" : "rgba(255,255,255,0.55)",
                    borderRadius:6, padding:"2px 3px",
                    cursor: isEditing ? "pointer" : "default",
                    textDecoration: isEditing ? "underline dotted #C8A878" : "none",
                  }}>
                  {dispCat}
                </div>

                {/* 메모 + 버튼 */}
                <div style={{display:"flex",alignItems:"center",gap:3,overflow:"hidden",minWidth:0}}>
                  {isEditing ? (
                    <input
                      value={editForm.memo}
                      onChange={e=>setEditForm(f=>({...f,memo:e.target.value}))}
                      placeholder="메모"
                      style={{
                        flex:1, minWidth:0, fontSize:10, color:"#2C1A0A",
                        border:"none", borderBottom:"1.5px solid #C8A878",
                        background:"transparent", outline:"none", padding:"1px 2px",
                      }}
                    />
                  ) : (
                    <span style={{...cellBase,flex:1,fontSize:10,color:"#9A8870",minWidth:"3.5em"}}>
                      {dispMemo}
                    </span>
                  )}
                  {isEditing ? (
                    <>
                      <button onClick={saveEdit} style={{
                        flexShrink:0,height:18,padding:"0 6px",borderRadius:4,border:"none",
                        background:"#C8A878",color:"#fff",fontSize:9,fontWeight:700,cursor:"pointer"}}>✓</button>
                      <button onClick={()=>{setEditingId(null);setFloatType(null);}} style={{
                        flexShrink:0,width:18,height:18,borderRadius:4,border:"none",
                        background:"#EDE0C8",color:"#8A7060",fontSize:11,fontWeight:700,cursor:"pointer"}}>✕</button>
                    </>
                  ) : (
                    <>
                      <button onClick={()=>openEdit(log)} style={{
                        flexShrink:0,width:18,height:18,borderRadius:4,border:"none",
                        background:"#EDE0C8",color:"#8A7060",fontSize:9,fontWeight:700,cursor:"pointer"}}>✎</button>
                      <button onClick={()=>setConfirmId(log.id)} style={{
                        flexShrink:0,width:18,height:18,borderRadius:4,border:"none",
                        background:"#FCE4E4",color:THEME.income.deep,fontSize:11,fontWeight:700,cursor:"pointer"}}>×</button>
                    </>
                  )}
                </div>
              </div>

              {/* ── 삭제 확인 행 ── */}
              {isConfirm && (
                <div style={{
                  padding:"10px 12px",background:"#fff",
                  border:"1px solid #E0D0B8",borderTop:"none",
                  borderRadius: isLast ? "0 0 12px 12px" : 0,
                  display:"flex",alignItems:"center",justifyContent:"space-between",gap:8,
                }}>
                  <span style={{fontSize:12,color:THEME.income.deep,fontWeight:700}}>정말 삭제할까요?</span>
                  <div style={{display:"flex",gap:6}}>
                    <button onClick={()=>{onDelete(log.id);setConfirmId(null);}} style={{
                      borderRadius:8,border:"none",background:THEME.income.deep,
                      color:"#fff",padding:"5px 14px",fontWeight:700,fontSize:12,cursor:"pointer"}}>삭제</button>
                    <button onClick={()=>setConfirmId(null)} style={{
                      borderRadius:8,border:"none",background:"#EDE0C8",
                      color:"#8A7060",padding:"5px 10px",fontWeight:600,fontSize:12,cursor:"pointer"}}>취소</button>
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>

      {/* 플로팅 패널들 */}
      {floatType==="date"     && <FloatDate/>}
      {floatType==="amount"   && <FloatCalc/>}
      {floatType==="category" && <FloatCategory/>}
    </div>
  );
}

// 설정 화면
// ════════════════════════════════════════════════════
function SettingScreen({ subCategories, setSubCategories }) {
  const [tab, setTab]               = useState("지출");
  const [newCat, setNewCat]         = useState("");
  const [editingCat, setEditingCat] = useState(null);
  const [activeIdx, setActiveIdx]   = useState(null); // 햄버거로 선택된 행
  const [previewIdx, setPreviewIdx] = useState(null); // 이동 예상 위치 (0~length)

  const TABS_CFG = [
    { id:"지출", label:"💸 지출", theme: THEME.expense },
    { id:"수입", label:"💰 수입", theme: THEME.income  },
    { id:"자산", label:"🏦 자산", theme: THEME.beige   },
  ];
  const tTheme = TABS_CFG.find(t=>t.id===tab)?.theme || THEME.beige;
  const list   = subCategories[tab] || [];

  const addCat = () => {
    const v = newCat.trim();
    if (!v || list.includes(v)) return;
    setSubCategories(p=>({...p,[tab]:[...p[tab],v]}));
    setNewCat("");
  };
  const deleteCat = (cat) => {
    setSubCategories(p=>({...p,[tab]:p[tab].filter(c=>c!==cat)}));
    setActiveIdx(null); setPreviewIdx(null);
  };
  const startEdit = (cat) => { setEditingCat({oldName:cat, newName:cat}); setActiveIdx(null); setPreviewIdx(null); };
  const saveEdit  = () => {
    if (!editingCat) return;
    const {oldName, newName} = editingCat;
    const v = newName.trim();
    if (!v || (v!==oldName && list.includes(v))) { setEditingCat(null); return; }
    setSubCategories(p=>({...p,[tab]:p[tab].map(c=>c===oldName?v:c)}));
    setEditingCat(null);
  };

  // 햄버거 클릭: 선택/해제
  const toggleActive = (i) => {
    if (activeIdx === i) { setActiveIdx(null); setPreviewIdx(null); }
    else { setActiveIdx(i); setPreviewIdx(null); }
    setEditingCat(null);
  };

  // 활성 행일 때 위/아래 버튼으로 예상 위치 조정
  const movePreviewUp   = () => setPreviewIdx(p => Math.max(0,           (p ?? activeIdx) - 1));
  const movePreviewDown = () => setPreviewIdx(p => Math.min(list.length-1,(p ?? activeIdx) + 1));

  // 확정 이동
  const confirmMove = () => {
    if (activeIdx === null || previewIdx === null || previewIdx === activeIdx) {
      setActiveIdx(null); setPreviewIdx(null); return;
    }
    const arr = [...list];
    const [moved] = arr.splice(activeIdx, 1);
    arr.splice(previewIdx, 0, moved);
    setSubCategories(p=>({...p,[tab]:arr}));
    setActiveIdx(null); setPreviewIdx(null);
  };

  const cancelMove = () => { setActiveIdx(null); setPreviewIdx(null); };

  const btnBase = {
    borderRadius:6, border:"none", fontWeight:700,
    cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center",
    flexShrink:0, lineHeight:1,
  };

  const dest = previewIdx ?? activeIdx; // 현재 예상 위치

  return (
    <div style={{position:"relative",zIndex:1,display:"flex",flexDirection:"column",alignItems:"center",padding:"16px 0 90px"}}>
      <div style={{width:"calc(100% - 24px)",maxWidth:480,boxSizing:"border-box"}}>

        {/* 파일폴더 탭 */}
        <div style={{display:"flex",alignItems:"flex-end"}}>
          {TABS_CFG.map(({id,label,theme},i)=>{
            const isActive = tab===id;
            return (
              <button key={id}
                onClick={()=>{setTab(id);setNewCat("");setEditingCat(null);setActiveIdx(null);setPreviewIdx(null);}}
                style={{
                  position:"relative", padding:"6px 16px 8px",
                  borderRadius:"10px 10px 0 0",
                  borderLeft:`1px solid ${isActive?"#B89060":"#C8B890"}`,
                  borderRight:`1px solid ${isActive?"#B89060":"#C8B890"}`,
                  borderTop:`1px solid ${isActive?"#B89060":"#C8B890"}`,
                  borderBottom:isActive?"1px solid rgba(251,245,232,0.97)":"1px solid #B89060",
                  background:isActive?"rgba(251,245,232,0.97)":"rgba(228,215,190,0.80)",
                  color:isActive?theme.deep:"#A09070",
                  fontWeight:isActive?800:600, fontSize:12, cursor:"pointer",
                  marginRight:i<TABS_CFG.length-1?-1:0,
                  zIndex:isActive?3:1, outline:"none",
                  minWidth:76, textAlign:"center",
                }}>
                {label}
              </button>
            );
          })}
        </div>

        {/* 소분류 카드 */}
        <div style={{
          position:"relative",zIndex:2,
          background:"rgba(251,245,232,0.97)",backdropFilter:"blur(14px)",
          borderRadius:"0 12px 12px 12px",padding:"16px 14px",
          border:"1px solid #B89060",marginTop:"-1px",
        }}>
          <div style={{fontSize:10,fontWeight:700,color:"#B8A080",letterSpacing:0.8,marginBottom:12}}>
            {tab} 소분류 관리
          </div>

          {/* 활성화 상태일 때 이동 컨트롤 */}
          {activeIdx !== null && (
            <div style={{
              display:"flex",alignItems:"center",gap:6,
              marginBottom:10,padding:"7px 10px",
              background:"#FFF5C0",borderRadius:9,
              border:"1.5px solid #E8CC70",
            }}>
              <span style={{flex:1,fontSize:12,fontWeight:700,color:"#806010"}}>
                「{list[activeIdx]}」 이동 중
              </span>
              <button onClick={movePreviewUp}
                disabled={dest===0}
                style={{...btnBase,width:28,height:28,fontSize:12,
                  background:dest===0?"#F5ECD8":"#D8C8A8",
                  color:dest===0?"#C8B898":"#6A5040"}}>▲</button>
              <button onClick={movePreviewDown}
                disabled={dest===list.length-1}
                style={{...btnBase,width:28,height:28,fontSize:12,
                  background:dest===list.length-1?"#F5ECD8":"#D8C8A8",
                  color:dest===list.length-1?"#C8B898":"#6A5040"}}>▼</button>
              <button onClick={confirmMove}
                style={{...btnBase,padding:"4px 10px",fontSize:11,
                  background:tTheme.main,color:"#fff",
                  opacity:previewIdx===null||previewIdx===activeIdx?0.45:1}}>확인</button>
              <button onClick={cancelMove}
                style={{...btnBase,padding:"4px 8px",fontSize:11,
                  background:"#EDE0C8",color:"#8A7060"}}>취소</button>
            </div>
          )}

          {list.length===0 ? (
            <div style={{fontSize:12,color:"#C8B090",textAlign:"center",padding:"16px 0"}}>
              등록된 소분류가 없어요
            </div>
          ) : (
            <div style={{display:"flex",flexDirection:"column",gap:5}}>
              {list.map((cat,i)=>{
                const isEdit   = editingCat?.oldName===cat;
                const isActive = activeIdx===i;
                // 미리보기 선: previewIdx 위치에 선 하나만 표시
                // previewIdx < activeIdx → i===previewIdx 행 위에 선
                // previewIdx > activeIdx → 마지막 이동이면 마지막 행 아래에, 아니면 i===previewIdx 행 위에
                const movingDown = previewIdx!==null && activeIdx!==null && previewIdx > activeIdx;
                const showLineAbove = activeIdx!==null && previewIdx!==null
                                      && previewIdx!==activeIdx
                                      && i===previewIdx && !movingDown;
                const showLineBelow = activeIdx!==null && previewIdx!==null
                                      && previewIdx!==activeIdx
                                      && movingDown && i===previewIdx;
                return (
                  <div key={cat}>
                    {/* 드롭 예상 위치 선 (위) */}
                    {showLineAbove && (
                      <div style={{height:2,borderRadius:1,background:"#6A5040",margin:"0 0 3px 0"}}/>
                    )}

                    <div style={{
                      display:"flex", alignItems:"center", gap:0,
                      background: isActive ? "#FFF5C0" : isEdit ? tTheme.light : "rgba(255,255,255,0.75)",
                      borderRadius:9, overflow:"hidden",
                      border:`1px solid ${isActive?"#E8CC70":isEdit?tTheme.main:"#E8D8C0"}`,
                      opacity: activeIdx!==null && !isActive ? 0.55 : 1,
                      transition:"background 0.15s, opacity 0.15s",
                    }}>
                      {/* 햄버거 핸들 */}
                      <div
                        onClick={()=>toggleActive(i)}
                        style={{
                          flexShrink:0, width:32, alignSelf:"stretch",
                          display:"flex", alignItems:"center", justifyContent:"center",
                          background: isActive ? "#F0E090" : "#EDE0C8",
                          borderRight:"1px solid #E0D0B8",
                          cursor:"pointer",
                          userSelect:"none",
                        }}>
                        <svg width="12" height="10" viewBox="0 0 12 10" fill="none">
                          <rect y="0"   width="12" height="1.8" rx="0.9" fill={isActive?"#806010":"#A09070"}/>
                          <rect y="4.1" width="12" height="1.8" rx="0.9" fill={isActive?"#806010":"#A09070"}/>
                          <rect y="8.2" width="12" height="1.8" rx="0.9" fill={isActive?"#806010":"#A09070"}/>
                        </svg>
                      </div>

                      {/* 이름 */}
                      <div style={{flex:1, padding:"7px 8px 7px 12px", minWidth:0}}>
                        {isEdit ? (
                          <input value={editingCat.newName}
                            onChange={e=>setEditingCat(p=>({...p,newName:e.target.value}))}
                            onKeyDown={e=>e.key==="Enter"&&saveEdit()} autoFocus
                            style={{width:"100%",borderRadius:7,border:`1.5px solid ${tTheme.main}`,
                              padding:"3px 8px",fontSize:12,outline:"none",background:"#fff",boxSizing:"border-box"}}/>
                        ) : (
                          <span style={{fontSize:13,fontWeight:600,color:"#6A5040"}}>{cat}</span>
                        )}
                      </div>

                      {/* 수정/저장/삭제 */}
                      <div style={{display:"flex",gap:4,padding:"0 8px",flexShrink:0}}>
                        {isEdit ? (
                          <>
                            <button onClick={saveEdit} style={{...btnBase,padding:"4px 10px",fontSize:11,background:tTheme.main,color:"#fff"}}>저장</button>
                            <button onClick={()=>setEditingCat(null)} style={{...btnBase,padding:"4px 8px",fontSize:11,background:"#EDE0C8",color:"#8A7060"}}>취소</button>
                          </>
                        ) : (
                          <>
                            <button onClick={()=>startEdit(cat)} style={{...btnBase,padding:"4px 8px",fontSize:10,background:"#EDE0C8",color:"#8A7060"}}>수정</button>
                            <button onClick={()=>deleteCat(cat)} style={{...btnBase,padding:"4px 8px",fontSize:10,background:"#FCE4E4",color:THEME.income.deep}}>삭제</button>
                          </>
                        )}
                      </div>
                    </div>

                    {/* 드롭 예상 위치 선 (아래, 마지막 항목 아래로 이동 시) */}
                    {showLineBelow && (
                      <div style={{height:2,borderRadius:1,background:"#6A5040",margin:"3px 0 0 0"}}/>
                    )}
                  </div>
                );
              })}
            </div>
          )}

          {/* 추가 */}
          <div style={{display:"flex",gap:6,marginTop:12}}>
            <input value={newCat} onChange={e=>setNewCat(e.target.value)}
              onKeyDown={e=>e.key==="Enter"&&addCat()}
              placeholder={`새 ${tab} 소분류 이름`}
              style={{flex:1,borderRadius:10,border:"1.5px solid #E0D0B8",
                padding:"7px 12px",fontSize:12,outline:"none",background:"#fff"}}/>
            <button onClick={addCat} style={{borderRadius:10,border:"none",
              background:tTheme.main,color:"#fff",padding:"7px 16px",
              fontWeight:700,fontSize:13,cursor:"pointer",flexShrink:0}}>+ 추가</button>
          </div>
        </div>
      </div>
    </div>
  );
}
// ════════════════════════════════════════════════════
// 메인 App
// ════════════════════════════════════════════════════
function App() {
  const [loading, setLoading]       = useState(true);
  const [tab,setTab]                = useState("input");
  const [logs,setLogs]              = useState([]);
  const [subCategories,setSubCategories] = useState({ 지출:[], 수입:[], 자산:[] });
  const [songColor,setSongColor]    = useState(DEFAULT_SONG);
  const [phwangColor,setPhwangColor]= useState(DEFAULT_PHWANG);
  const [showColorPicker,setShowColorPicker] = useState(null);

  useEffect(() => {
    const t = setTimeout(() => setLoading(false), 2200);
    const init = () => {
      if (!window.db) { setTimeout(init,100); return; }
      const db = window.db;
      const u1 = window.fbOnSnapshot(window.fbCollection(db,"logs"), snap => {
        setLogs(snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>b.date.localeCompare(a.date)));
      });
      const u2 = window.fbOnSnapshot(window.fbDoc(db,"settings","main"), snap => {
        if(snap.exists()){
          const d=snap.data();
          if(d.subCategories) setSubCategories(d.subCategories);
          if(d.songColor)     setSongColor(d.songColor);
          if(d.phwangColor)   setPhwangColor(d.phwangColor);
        }
      });
      return ()=>{ u1(); u2(); };
    };
    const cleanup = init();
    return ()=>{ clearTimeout(t); if(typeof cleanup==="function") cleanup(); };
  }, []);

  const handleSave = async (entry) => {
    try { const {id,...data}=entry; await window.fbAddDoc(window.fbCollection(window.db,"logs"),data); setTab("log"); }
    catch(e){ console.error(e); }
  };
  const handleDelete = async (id) => {
    try { await window.fbDeleteDoc(window.fbDoc(window.db,"logs",id)); }
    catch(e){ console.error(e); }
  };
  const handleEdit = async (id,patch) => {
    try { await window.fbUpdateDoc(window.fbDoc(window.db,"logs",id),patch); }
    catch(e){ console.error(e); }
  };

  // ── 로딩 화면 ──────────────────────────────────────
  if (loading) return (
    <div style={{
      position:"fixed", inset:0, zIndex:999,
      backgroundImage:`url(${LOADING_IMG})`,
      backgroundSize:"cover",
      backgroundPosition:"center center",
      backgroundRepeat:"no-repeat",
      fontFamily:"'Pretendard','Noto Sans KR',sans-serif",
    }}/>
  );

  return (
    <div style={{minHeight:"100vh",position:"relative",fontFamily:"'Pretendard','Noto Sans KR',sans-serif"}}>
      <SkyBackground/>

      {tab==="input"   && <InputScreen onSave={handleSave} songColor={songColor} phwangColor={phwangColor}
          subCategories={subCategories} showColorPicker={showColorPicker} setShowColorPicker={setShowColorPicker}/>}
      {tab==="analyze" && <AnalyzeScreen/>}
      {tab==="saving"  && <SavingScreen subCategories={subCategories}/>}
      {tab==="log"     && <LogScreen logs={logs} onDelete={handleDelete} onEdit={handleEdit}
          songColor={songColor} phwangColor={phwangColor} subCategories={subCategories}/>}
      {tab==="setting" && <SettingScreen subCategories={subCategories} setSubCategories={async fn=>{ const next=typeof fn==="function"?fn(subCategories):fn; setSubCategories(next); try{await window.fbSetDoc(window.fbDoc(window.db,"settings","main"),{subCategories:next},{merge:true});}catch(e){console.error(e);} }}/>}
      <TabBar active={tab} onTab={setTab}/>

      {showColorPicker && (
        <ColorPicker who={showColorPicker} options={COLOR_OPTIONS[showColorPicker]}
          current={showColorPicker==="쏭"?songColor:phwangColor}
          onSelect={opt=>{ if(showColorPicker==="쏭") setSongColor(opt); window.fbSetDoc&&window.fbSetDoc(window.fbDoc(window.db,"settings","main"),{songColor:opt},{merge:true}).catch(console.error); else setPhwangColor(opt); window.fbSetDoc&&window.fbSetDoc(window.fbDoc(window.db,"settings","main"),{phwangColor:opt},{merge:true}).catch(console.error); setShowColorPicker(null); }}
          onClose={()=>setShowColorPicker(null)}/>
      )}
    </div>
  );
}


    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
